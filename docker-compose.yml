services:
  postgres:
    image: postgres:16-alpine
    container_name: nandesk-postgres
    environment:
      POSTGRES_DB: nandesk
      POSTGRES_USER: nandesk
      POSTGRES_PASSWORD: nandesk_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nandesk -d nandesk"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: nandesk-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://nandesk:nandesk_dev@postgres:5432/nandesk
      JWT_SECRET: dev-secret-change-me-in-production-min-16-chars
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: "*"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: nandesk-frontend
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  postgres_data:
